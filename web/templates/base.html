<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>{% block title %}小红书运营看板{% endblock %}</title>
    <style>
        :root {
            --bg-primary: #0a0a0f; --bg-secondary: #12121a; --bg-card: #16161f;
            --bg-hover: #1e1e2a; --bg-active: #252536; --border: #1e1e2e; --border-light: #2a2a3d;
            --text-primary: #e8e8ed; --text-secondary: #8b8b9e; --text-muted: #5a5a72;
            --accent: #6c5ce7; --accent-light: #a29bfe;
            --green: #00d2a0; --green-bg: rgba(0, 210, 160, 0.08);
            --red: #ff6b6b; --red-bg: rgba(255, 107, 107, 0.08);
            --orange: #ffa502; --orange-bg: rgba(255, 165, 2, 0.08);
            --blue: #4dabf7; --blue-bg: rgba(77, 171, 247, 0.08);
            --sidebar-width: 220px; --radius: 12px; --radius-sm: 8px;
            --font: -apple-system, "SF Pro Text", "PingFang SC", "Noto Sans SC", sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
        a { color: inherit; text-decoration: none; }
        .app { display: grid; grid-template-columns: var(--sidebar-width) 1fr; min-height: 100vh; }
        .sidebar { background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 24px 12px; position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100vh; display: flex; flex-direction: column; }
        .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 8px 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .sidebar-logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent-light)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; }
        .sidebar-logo-text { font-size: 15px; font-weight: 600; }
        .nav-section { margin-bottom: 20px; }
        .nav-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); padding: 0 12px; margin-bottom: 6px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 14px; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
        .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .nav-item.active { background: var(--bg-active); color: var(--text-primary); }
        .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
        .nav-item.active svg { opacity: 1; }
        .sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
        .main { margin-left: var(--sidebar-width); padding: 32px; }
        .page-header { margin-bottom: 28px; }
        .page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
        .page-subtitle { color: var(--text-secondary); font-size: 14px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
        .stat-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
        .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .card-title { font-size: 15px; font-weight: 600; }
        .card-body { padding: 20px; }
        .card-actions { display: flex; gap: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg-hover); color: var(--text-secondary); transition: all 0.15s; font-family: inherit; }
        .btn:hover { background: var(--bg-active); color: var(--text-primary); }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-light); border-color: var(--accent-light); }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .tag-purple { background: rgba(108, 92, 231, 0.12); color: var(--accent-light); }
        .tag-green { background: var(--green-bg); color: var(--green); }
        .tag-orange { background: var(--orange-bg); color: var(--orange); }
        .tag-blue { background: var(--blue-bg); color: var(--blue); }
        .tag-red { background: var(--red-bg); color: var(--red); }
        .chart-container { position: relative; height: 280px; width: 100%; }
        .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
        .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3; }
        .empty-state p { font-size: 14px; }
        .engagement-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .engagement-label { font-size: 13px; color: var(--text-secondary); width: 50px; flex-shrink: 0; }
        .engagement-track { flex: 1; height: 6px; background: var(--bg-active); border-radius: 3px; overflow: hidden; }
        .engagement-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
        .engagement-value { font-size: 13px; font-weight: 600; width: 60px; text-align: right; flex-shrink: 0; }
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-cloud-item { padding: 6px 14px; border-radius: 20px; font-size: 13px; background: var(--bg-active); color: var(--text-secondary); border: 1px solid var(--border); }
        .tag-cloud-item .count { font-size: 11px; color: var(--text-muted); margin-left: 4px; }
        .hotspot-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .hotspot-item:last-child { border-bottom: none; }
        .hotspot-rank { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
        .hotspot-rank.top { background: var(--accent); color: #fff; }
        .hotspot-rank.normal { background: var(--bg-active); color: var(--text-muted); }
        .hotspot-name { flex: 1; font-size: 14px; font-weight: 500; }
        .hotspot-confidence { font-size: 13px; font-weight: 600; color: var(--green); }
        .task-list { display: flex; flex-direction: column; gap: 8px; }
        .task-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--bg-secondary); border-radius: var(--radius-sm); border: 1px solid var(--border); }
        .task-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .task-status.running { background: var(--green); box-shadow: 0 0 8px rgba(0, 210, 160, 0.4); }
        .task-status.pending { background: var(--orange); }
        .task-status.done { background: var(--text-muted); }
        .task-info { flex: 1; min-width: 0; }
        .task-title { font-size: 14px; font-weight: 500; }
        .task-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .task-time { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
        @media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .grid-2, .grid-3 { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { position: fixed; width: 100%; height: auto; bottom: 0; top: auto; flex-direction: row; padding: 6px 8px; border-right: none; border-top: 1px solid var(--border); z-index: 100; overflow-x: auto; }
            .sidebar-logo, .nav-label, .sidebar-footer { display: none; }
            .nav-section { margin-bottom: 0; display: flex; gap: 2px; }
            .nav-item { flex-direction: column; font-size: 10px; padding: 6px 12px; gap: 2px; white-space: nowrap; min-width: 56px; justify-content: center; text-align: center; }
            .nav-item svg { width: 20px; height: 20px; }
            .main { margin-left: 0; padding: 16px; padding-bottom: 80px; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app">
        <nav class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">X</div>
                <span class="sidebar-logo-text">小红书运营</span>
            </div>
            <div class="nav-section">
                <div class="nav-label">总览</div>
                <a class="nav-item {% if active == 'overview' %}active{% endif %}" href="/">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    数据概览
                </a>
                <a class="nav-item {% if active == 'hotspots' %}active{% endif %}" href="/hotspots">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    热点趋势
                </a>
            </div>
            <div class="nav-section">
                <div class="nav-label">管理</div>
                <a class="nav-item {% if active == 'notes' %}active{% endif %}" href="/notes">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    内容管理
                </a>
                <a class="nav-item {% if active == 'tasks' %}active{% endif %}" href="/tasks">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    发布任务
                </a>
            </div>
            <div class="sidebar-footer">
                <a class="nav-item" href="https://github.com/SimonWicre/xiaohongshu-autopilot" target="_blank">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    GitHub
                </a>
            </div>
        </nav>
        <main class="main">{% block content %}{% endblock %}</main>
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
