{% extends "base.html" %}
{% set active = "notes" %}
{% block title %}内容管理 - 小红书运营看板{% endblock %}
{% block head %}
<style>
    .xhs-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center}
    .xhs-overlay.show{display:flex}
    .xhs-phone{width:375px;max-width:95vw;height:92vh;background:#fff;border-radius:24px;overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.5);display:flex;flex-direction:column}
    .xhs-statusbar{height:44px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:14px;font-weight:600;color:#000;flex-shrink:0}
    .xhs-close{position:absolute;top:50px;left:12px;width:32px;height:32px;background:rgba(0,0,0,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;color:#fff;font-size:18px;border:none}
    .xhs-carousel{position:relative;width:100%;height:420px;overflow:hidden;flex-shrink:0;background:#f5f5f5}
    .xhs-carousel-track{display:flex;height:100%;transition:transform 0.3s ease}
    .xhs-carousel-slide{min-width:100%;height:100%;display:flex;align-items:center;justify-content:center}
    .xhs-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:5}
    .xhs-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);transition:all 0.2s}
    .xhs-dot.active{background:#fff;width:18px;border-radius:3px}
    .xhs-counter{position:absolute;top:56px;right:12px;background:rgba(0,0,0,0.4);color:#fff;font-size:12px;padding:3px 10px;border-radius:12px;z-index:5}
    .xhs-content{flex:1;overflow-y:auto;padding:16px 16px 0}
    .xhs-author{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .xhs-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
    .xhs-author-name{font-size:14px;font-weight:600;color:#333}
    .xhs-author-time{font-size:11px;color:#999}
    .xhs-note-title{font-size:18px;font-weight:700;color:#222;line-height:1.5;margin-bottom:12px}
    .xhs-note-body{font-size:15px;line-height:1.8;color:#333;margin-bottom:16px;white-space:pre-wrap}
    .xhs-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
    .xhs-tag{font-size:13px;color:#ff2442;background:rgba(255,36,66,0.06);padding:4px 10px;border-radius:4px}
    .xhs-bottombar{display:flex;align-items:center;padding:10px 16px;border-top:1px solid #f0f0f0;background:#fff;flex-shrink:0;gap:4px}
    .xhs-input{flex:1;height:36px;background:#f5f5f5;border-radius:18px;padding:0 16px;font-size:13px;color:#999;display:flex;align-items:center}
    .xhs-action{display:flex;flex-direction:column;align-items:center;padding:0 10px;font-size:10px;color:#666}
    .xhs-action svg{width:22px;height:22px;margin-bottom:2px}
    .note-card{margin-bottom:16px;padding:20px;background:var(--bg-secondary);border-radius:var(--radius-sm);border:1px solid var(--border)}
    .note-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
    .note-card-title{font-size:17px;font-weight:600;color:var(--text-primary);line-height:1.4}
    .note-card-meta{font-size:12px;color:var(--text-muted);margin-bottom:12px}
    .note-card-content{font-size:14px;line-height:1.8;color:var(--text-secondary);white-space:pre-wrap;margin-bottom:12px}
    .note-card-actions{display:flex;gap:8px}
    @media(max-width:768px){.xhs-phone{width:100vw;height:100vh;border-radius:0}.xhs-overlay{align-items:flex-end}}
</style>
{% endblock %}
{% block content %}
<div class="page-header"><h1 class="page-title">内容管理</h1><p class="page-subtitle">AI 生成的小红书笔记，点击「预览」查看小红书效果</p></div>
<div class="card">
    <div class="card-header">
        <span class="card-title">已生成笔记</span>
        <div class="card-actions">
            <a class="btn btn-sm" href="/notes"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>刷新</a>
            <button class="btn btn-sm btn-primary" id="btn-generate" onclick="doGenerate()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>AI 生成</button>
        </div>
    </div>
    <div class="card-body" id="notes-list"><div class="loading"><div class="spinner"></div>加载中...</div></div>
</div>

<div class="xhs-overlay" id="xhs-overlay" onclick="if(event.target===this)closeXhs()">
    <div class="xhs-phone">
        <div class="xhs-statusbar"><span>12:00</span><span style="font-size:12px;display:flex;gap:6px;align-items:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg></span></div>
        <button class="xhs-close" onclick="closeXhs()">&times;</button>
        <div class="xhs-carousel" id="xhs-carousel">
            <div class="xhs-carousel-track" id="xhs-track"></div>
            <div class="xhs-dots" id="xhs-dots"></div>
            <div class="xhs-counter" id="xhs-counter">1/4</div>
        </div>
        <div class="xhs-content" id="xhs-content"></div>
        <div class="xhs-bottombar">
            <div class="xhs-input">说点什么...</div>
            <div class="xhs-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>0</div>
            <div class="xhs-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>0</div>
            <div class="xhs-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
var grads=['linear-gradient(135deg,#ff6b6b,#ee5a24)','linear-gradient(135deg,#a29bfe,#6c5ce7)','linear-gradient(135deg,#00d2a0,#00b894)','linear-gradient(135deg,#4dabf7,#0984e3)','linear-gradient(135deg,#ffa502,#fdcb6e)','linear-gradient(135deg,#fd79a8,#e84393)','linear-gradient(135deg,#55efc4,#00b894)','linear-gradient(135deg,#74b9ff,#0984e3)'];
var emojis=['🔥','💡','✨','🎯','📊','🚀','💎','🌟','🎉','❤️'];
function mkCover(t,i){var g=grads[i%grads.length],e=emojis[i%emojis.length];return'<div style="width:100%;height:100%;background:'+g+';display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px"><div style="font-size:64px;margin-bottom:16px">'+e+'</div><div style="color:#fff;font-size:22px;font-weight:700;text-align:center;line-height:1.4;text-shadow:0 2px 8px rgba(0,0,0,0.3)">'+esc(t)+'</div></div>'}

var curSlide=0,totalSlides=4,touchX=0,allNotes=[];

function openXhs(idx){
    var n=allNotes[idx];if(!n)return;
    var track=document.getElementById('xhs-track'),dots=document.getElementById('xhs-dots');
    var slides=[
        mkCover(n.title,idx),
        '<div style="width:100%;height:100%;background:linear-gradient(135deg,#2d3436,#636e72);display:flex;align-items:center;justify-content:center;padding:30px"><div style="color:#fff;font-size:18px;line-height:2;text-align:center;white-space:pre-wrap">'+esc(n.content.slice(0,200))+'</div></div>',
        mkCover(n.tags[0]||'干货',idx+3),
        '<div style="width:100%;height:100%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px"><div style="font-size:48px;margin-bottom:16px">📋</div><div style="color:#333;font-size:16px;text-align:center;line-height:1.6">'+n.tags.map(function(t){return'#'+t}).join('  ')+'</div></div>'
    ];
    track.innerHTML=slides.map(function(s){return'<div class="xhs-carousel-slide">'+s+'</div>'}).join('');
    dots.innerHTML=slides.map(function(_,i){return'<div class="xhs-dot'+(i===0?' active':'')+'"></div>'}).join('');
    totalSlides=slides.length;curSlide=0;
    document.getElementById('xhs-counter').textContent='1/'+totalSlides;

    var car=document.getElementById('xhs-carousel');
    car.ontouchstart=function(e){touchX=e.touches[0].clientX};
    car.ontouchend=function(e){var dx=e.changedTouches[0].clientX-touchX;if(Math.abs(dx)>50)slide(dx<0?1:-1)};
    car.onmousedown=function(e){touchX=e.clientX};
    car.onmouseup=function(e){var dx=e.clientX-touchX;if(Math.abs(dx)>50)slide(dx<0?1:-1)};

    var ac=['#ff2442','#ff6b6b','#6c5ce7','#00d2a0','#4dabf7','#ffa502'][idx%6];
    document.getElementById('xhs-content').innerHTML=
        '<div class="xhs-author"><div class="xhs-avatar" style="background:'+ac+'">AI</div><div><div class="xhs-author-name">小红书运营助手</div><div class="xhs-author-time">刚刚 · '+esc(n.topic)+'</div></div></div>'+
        '<div class="xhs-note-title">'+esc(n.title)+'</div>'+
        '<div class="xhs-note-body">'+esc(n.content)+'</div>'+
        '<div class="xhs-tags">'+n.tags.map(function(t){return'<span class="xhs-tag">#'+esc(t)+'</span>'}).join('')+'</div>';

    document.getElementById('xhs-overlay').classList.add('show');
    document.body.style.overflow='hidden';
}
function closeXhs(){document.getElementById('xhs-overlay').classList.remove('show');document.body.style.overflow=''}
function slide(dir){
    curSlide=Math.max(0,Math.min(totalSlides-1,curSlide+dir));
    document.getElementById('xhs-track').style.transform='translateX(-'+curSlide*100+'%)';
    document.getElementById('xhs-counter').textContent=(curSlide+1)+'/'+totalSlides;
    document.querySelectorAll('.xhs-dot').forEach(function(d,i){d.className='xhs-dot'+(i===curSlide?' active':'')});
}

async function loadGenerated(){
    try{var r=await fetch('/api/generated');var d=await r.json()}catch(e){return}
    var el=document.getElementById('notes-list');el.innerHTML='';
    if(!d.notes||!d.notes.length){el.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>暂无生成的笔记，点击「AI 生成」创建</p></div>';return}
    allNotes=d.notes;
    d.notes.forEach(function(n,i){
        el.innerHTML+='<div class="note-card"><div class="note-card-header"><div class="note-card-title">'+esc(n.title)+'</div><span class="tag tag-green" style="flex-shrink:0;margin-left:12px">AI</span></div><div class="note-card-meta">话题: '+esc(n.topic)+' &nbsp; '+n.tags.map(function(t){return'<span class="tag tag-purple">'+esc(t)+'</span>'}).join(' ')+'</div><div class="note-card-content">'+esc(n.content)+'</div><div class="note-card-actions"><button class="btn btn-sm btn-primary" onclick="openXhs('+i+')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>预览</button></div></div>'
    })
}
async function doGenerate(){
    var btn=document.getElementById('btn-generate');btn.disabled=true;btn.innerHTML='<div class="spinner" style="width:14px;height:14px;margin:0"></div> 生成中...';
    try{await fetch('/api/generate',{method:'POST'})}catch(e){}
    btn.disabled=false;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>AI 生成';
    loadGenerated();
}
document.addEventListener('DOMContentLoaded',loadGenerated);
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeXhs()});
</script>
{% endblock %}
