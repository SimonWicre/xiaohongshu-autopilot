{% extends "base.html" %}
{% set active = "tasks" %}
{% block title %}发布任务 - 小红书运营看板{% endblock %}
{% block content %}
<div class="page-header"><h1 class="page-title">发布任务</h1><p class="page-subtitle">管理笔记发布任务和状态</p></div>
<div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
    <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--green)"></span>运行中</div><div class="stat-value" id="task-running">0</div></div>
    <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--orange)"></span>等待中</div><div class="stat-value" id="task-pending">0</div></div>
    <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--text-muted)"></span>已完成</div><div class="stat-value" id="task-done">0</div></div>
</div>
<div class="card">
    <div class="card-header"><span class="card-title">任务队列</span><div class="card-actions"><button class="btn btn-sm btn-primary" onclick="startPublish()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>开始发布</button></div></div>
    <div class="card-body"><div class="task-list" id="task-list"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><p>暂无发布任务</p></div></div></div>
</div>
{% endblock %}
{% block scripts %}
<script>
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
async function startPublish(){
    var r=await fetch('/api/generated');var d=await r.json();
    if(!d.notes||!d.notes.length){alert('请先在「内容管理」页面生成笔记');window.location.href='/notes';return}
    var list=document.getElementById('task-list');list.innerHTML='';
    var notes=d.notes.slice(0,3);document.getElementById('task-pending').textContent=notes.length;
    notes.forEach(function(n,i){list.innerHTML+='<div class="task-item" id="task-'+i+'"><span class="task-status pending"></span><div class="task-info"><div class="task-title">'+esc(n.title)+'</div><div class="task-meta">等待发布...</div></div><span class="task-time">-</span></div>'});
    for(var i=0;i<notes.length;i++){
        var el=document.getElementById('task-'+i);
        el.querySelector('.task-status').className='task-status running';el.querySelector('.task-meta').textContent='发布中...';
        document.getElementById('task-running').textContent='1';document.getElementById('task-pending').textContent=String(notes.length-i-1);
        await new Promise(function(r){setTimeout(r,1500)});
        el.querySelector('.task-status').className='task-status done';el.querySelector('.task-meta').textContent='发布完成';
        el.querySelector('.task-time').textContent=new Date().toLocaleTimeString('zh-CN');
        document.getElementById('task-running').textContent='0';document.getElementById('task-done').textContent=String(i+1);
    }
}
</script>
{% endblock %}
