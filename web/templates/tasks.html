{% extends "base.html" %}
{% set active = "tasks" %}
{% block title %}发布任务 - 小红书运营看板{% endblock %}
{% block content %}
<div class="page-header"><h1 class="page-title">发布任务</h1><p class="page-subtitle">管理笔记发布任务和状态</p></div>
<div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
    <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--green)"></span>运行中</div><div class="stat-value" id="task-running">0</div></div>
    <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--orange)"></span>等待中</div><div class="stat-value" id="task-pending">0</div></div>
    <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--text-muted)"></span>已完成</div><div class="stat-value" id="task-done">0</div></div>
</div>
<div class="card">
    <div class="card-header"><span class="card-title">任务队列</span><div class="card-actions"><button class="btn btn-sm btn-primary" id="btn-publish" onclick="startPublish()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>开始发布</button></div></div>
    <div class="card-body"><div class="task-list" id="task-list"><div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><p>暂无发布任务，点击「开始发布」发布 AI 生成的笔记</p></div></div></div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function startPublish(){
    var btn=document.getElementById('btn-publish');btn.disabled=true;btn.textContent='获取笔记...';
    var d;
    try{var r=await fetch('/api/generated');d=await r.json()}catch(e){btn.disabled=false;btn.innerHTML='开始发布';alert('无法获取笔记数据');return}
    if(!d.notes||!d.notes.length){btn.disabled=false;btn.innerHTML='开始发布';alert('请先在「内容管理」页面生成笔记');window.location.href='/notes';return}
    var list=document.getElementById('task-list');list.innerHTML='';
    var notes=d.notes;document.getElementById('task-pending').textContent=notes.length;
    notes.forEach(function(n,i){list.innerHTML+='<div class="task-item" id="task-'+i+'"><span class="task-status pending"></span><div class="task-info"><div class="task-title">'+esc(n.title)+'</div><div class="task-meta">等待发布...</div></div><span class="task-time">-</span></div>'});
    btn.textContent='提交任务...';

    var job;
    try{var resp=await fetch('/api/publish/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:notes})});job=await resp.json()}
    catch(e){btn.disabled=false;btn.innerHTML='开始发布';alert('提交失败: '+e.message);return}
    if(job.error){btn.disabled=false;btn.innerHTML='开始发布';alert('提交失败: '+job.error);return}

    document.getElementById('task-running').textContent=String(job.total);
    btn.textContent='发布中 (0/'+job.total+')...';

    for(var i=0;i<3600;i++){
        await new Promise(function(r){setTimeout(r,2000)});
        var s;
        try{var sr=await fetch('/api/publish/status/'+job.job_id);s=await sr.json()}
        catch(e){continue}
        if(s.error){btn.textContent='查询失败';return}

        (s.results||[]).forEach(function(r,j){var el=document.getElementById('task-'+j);if(!el)return;
            el.querySelector('.task-status').className=r.success?'task-status done':'task-status done';
            el.querySelector('.task-meta').textContent=r.success?'发布成功':'失败: '+(r.error||'未知');
            el.querySelector('.task-time').textContent=new Date().toLocaleTimeString('zh-CN')});

        document.getElementById('task-running').textContent=String(s.total - s.completed);
        document.getElementById('task-pending').textContent='0';
        btn.textContent='发布中 ('+s.completed+'/'+s.total+')...';

        if(s.status==='done'){
            var ok=(s.results||[]).filter(function(r){return r.success}).length;
            document.getElementById('task-done').textContent=String(ok);
            btn.disabled=false;btn.innerHTML='开始发布';
            btn.textContent='发布完成 ('+s.completed+'/'+s.total+')';
            return;
        }
        if(s.status==='error'){
            btn.disabled=false;btn.textContent='发布失败: '+(s.error||'未知');
            alert('发布异常: '+(s.error||'未知'));
            return;
        }
    }
    btn.disabled=false;btn.textContent='轮询超时（>2 小时）';
}
</script>
{% endblock %}
